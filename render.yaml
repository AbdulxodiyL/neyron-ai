services:
  - type: web
    name: neyron-ai-backend
    env: node
    rootDir: bialogiya_beakent
    nodeVersion: 22
    buildCommand: npm install --include=dev && npx prisma generate
    startCommand: node server.js
    plan: free
    region: frankfurt
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_ACCESS_EXPIRES
        value: 15m
      - key: JWT_REFRESH_EXPIRES
        value: 7d
      - key: OPENAI_MODEL
        value: gpt-4o
      - key: MAX_FILE_SIZE_MB
        value: "50"
      - key: UPLOAD_DIR
        value: uploads/
      - key: CLIENT_URL
        value: https://neyron-ai-frontend.onrender.com
      # Set these in Render Dashboard > Environment:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false

  - type: web
    name: neyron-ai-frontend
    env: static
    rootDir: bialogiya_frontend
    nodeVersion: 22
    buildCommand: npm install --include=dev && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://neyron-ai-backend.onrender.com/api
